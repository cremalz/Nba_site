<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Estilizado</title>
<style>
/* ======== ESTILO BASE ======== */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  color: white;
  font-family: 'Lato', sans-serif;
}
.container {
  text-align: center;
}
.wrapper {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  border-radius: 10px;
  background: none;
  color: white;
  transition: 0.3s;
}

/* ======== ESTILO DO BOTÃO LINK ======== */
.link_wrapper {
  position: relative;
  display: inline-block;
  margin-top: 10px;
}

a {
  display: block;
  width: 250px;
  height: 50px;
  line-height: 50px;
  font-weight: bold;
  text-decoration: none;
  background: #333;
  text-align: center;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: 3px solid #333;
  transition: all .35s;
}

.icon {
  width: 50px;
  height: 50px;
  border: 3px solid transparent;
  position: absolute;
  transform: rotate(45deg);
  right: 0;
  top: 0;
  z-index: -1;
  transition: all .35s;
}

.icon svg {
  width: 30px;
  position: absolute;
  top: calc(50% - 15px);
  left: calc(50% - 15px);
  transform: rotate(-45deg);
  fill: #CA202D;
  transition: all .35s;
}

a:hover {
  width: 200px;
  border: 3px solid #004A9F;
  background: transparent;
  color: #004A9F;
}

a:hover + .icon {
  border: 3px solid #CA202D;
  right: -25%;
}

/* ======== POPUP ======== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  justify-content: center;
  align-items: center;
  z-index: 999;
  transition: 0.3s ease-in-out;
}
.modal.active {
  display: flex;
}
.modal-content {
  background: #222;
  border: 2px solid #CA202D;
  border-radius: 12px;
  padding: 30px;
  width: 320px;
  max-width: 90%;
  text-align: center;
  box-shadow: 0 0 25px rgba(202,32,45,0.6);
  animation: popupAnim .4s ease forwards;
}
@keyframes popupAnim {
  from {
    opacity: 0;
    transform: scale(0.8);
  } to {
    opacity: 1;
    transform: scale(1);
  }
}
.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 22px;
  cursor: pointer;
  background: none;
  border: none;
  color: #CA202D;
  transition: 0.3s;
}
.close-btn:hover {
  transform: scale(1.2);
  color: #fff;
}
</style>
</head>
<body>

<div class="container">
  <button class="wrapper" id="abrirPopup">Abrir Pop-up</button>
</div>

<!-- ======== POPUP ======== -->
<div class="modal" id="popup">
  <div class="modal-content">
    <button class="close-btn" id="fecharPopup">✕</button>
    <h2>Bem-vindo ao Pop-up!</h2>
    <p>Esse é um pop-up estilizado com seu design moderno 😎</p>

    <div class="link_wrapper">
      <a href="#">Continuar</a>
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25">
          <path d="M10 17l5-5-5-5v10z"></path>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
const popup = document.getElementById('popup');
const abrir = document.getElementById('abrirPopup');
const fechar = document.getElementById('fecharPopup');

abrir.addEventListener('click', () => popup.classList.add('active'));
fechar.addEventListener('click', () => popup.classList.remove('active'));

popup.addEventListener('click', e => {
  if (e.target === popup) popup.classList.remove('active');
});
</script>

</body>
</html>
